name: Multiple shells commands #note that this is a Github actions workflow named "Multiple shells commands".i.e there are many workflows, but hier a Github workflow.
on: 
  push: 
    branches: 
      # - "main" 
      - never-trigger-this 
  pull_request: 
    types: [closed, assigned, opened, reopened] #workflow will be triggered on push to main branch or on pull request events like closed, assigned, opened, reopened.
jobs: 
  run-shell-command: #this is the first job named "run-shell-command" that will run on ubuntu-latest environment.
    runs-on: ubuntu-latest #when one of the above events occur, Github spins up a fresh Linux vm, installs preconfigured tools(python, Git) and then assigns the job to it.
    steps: 
      - name: python commands 
        run: | 
          import platform 
          print(platform.processor()) 
        shell: python 
  run-windows-command: #this is the second job named "run-windows-command" that will run on windows-latest environment.
    runs-on: windows-latest 
    needs: ["run-shell-command"] 
    steps: 
      - name: current directory with powershell 
        run: Get-Location 
      - name: current directory with bash 
        run: pwd 
        shell: bash 
      - name: print some default env variables 
        run: | 
          echo "HOME: ${HOME}" 
          echo "GITHUB_WORKFLOW: ${GITHUB_WORKFLOW}" 
          echo "GITHUB_ACTION: ${GITHUB_ACTION}" 
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS}" 
          echo "GITHUB_ACTOR: ${GITHUB_ACTOR}" 
          echo "GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}" 
          echo "GITHUB_EVENT_NAME: ${GITHUB_EVENT_NAME}" 
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}" 
        shell: bash