name: Shell commands

on:
  workflow_dispatch: # Ermöglcht den mauellen start über das Github Actions. i.e niemals wird automatisch durch einen push ausgelöst.

jobs:
  run-shell-command:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-20.04]
    steps:
      - name: echo a string
        run: echo "Hello world"
      
      - name: multiple scripts
        run: |
          python3 -V
          touch my_file_with_workflow.py
          ls -1  # Korrigiert: Unterstrich entfernt

    









